<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekta God Level 💎</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#f5d27a;
  --pink:#ff8fb1;
  --purple:#7b5cff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* NETFLIX INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.logo{
  font-size:3rem;
  font-family:'Cinzel';
  color:red;
  animation:zoom 2s forwards;
}
@keyframes zoom{
  from{letter-spacing:10px;opacity:0}
  to{letter-spacing:2px;opacity:1}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{
  font-size:3rem;
  background:linear-gradient(45deg,var(--gold),var(--pink));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  margin:30px;
}

/* CHAT */
.chat{
  max-width:400px;
  margin:auto;
}
.msg{
  background:#222;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

/* AVATAR */
.avatar{
  width:150px;
  border-radius:50%;
  margin:20px;
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  background:red;
  top:-10px;
  animation:fall 3s linear infinite;
}
@keyframes fall{
  to{transform:translateY(100vh)}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="logo">EKTA 💖</div>
  <button onclick="start()">Enter</button>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Happy Birthday Ekta 🎉</h1>
  <p>You are my favorite notification 💖</p>
</section>

<!-- AI AVATAR -->
<div class="glass" style="text-align:center;">
  <h2>👩‍🎨 Your Vibe</h2>
  <img class="avatar" src="https://source.unsplash.com/300x300/?girl,aesthetic">
</div>

<!-- CHAT STORY -->
<div class="glass chat">
  <h2>💬 Our Chat</h2>
  <div class="msg">You: Happy Birthday 🎉</div>
  <div class="msg">Ekta: Thank you 💖</div>
  <div class="msg">You: You mean everything to me</div>
</div>

<!-- VOICE -->
<div class="glass" style="text-align:center;">
  <h2>🎤 Voice Message</h2>
  <button onclick="playVoice()">Play</button>
  <audio id="voice" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>
</div>

<!-- GAME -->
<div class="glass">
  <h2>🎮 Tap Hearts</h2>
  <p>Score: <span id="score">0</span></p>
</div>

<script>
// START
function start(){
  document.getElementById("intro").style.display="none";
  confetti();
}

// CONFETTI
function confetti(){
  setInterval(()=>{
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  },200);
}

// GAME
let score=0;
setInterval(()=>{
  let h=document.createElement("div");
  h.innerHTML="💖";
  h.style.position="absolute";
  h.style.left=Math.random()*100+"%";
  h.style.top="100%";
  document.body.appendChild(h);

  let fall=setInterval(()=>{
    h.style.top=parseFloat(h.style.top)-1+"%";
    if(parseFloat(h.style.top)<0){
      h.remove();
      clearInterval(fall);
    }
  },20);

  h.onclick=()=>{
    score++;
    document.getElementById("score").innerText=score;
    h.remove();
  }
},1000);

// VOICE
function playVoice(){
  document.getElementById("voice").play();
}
</script>

</body>
  </html>
